<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente | ACAIP</title>
    <link href="./src/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Animación de los chevrons de fondo */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 0.5; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
        }
        .floating-icon { animation: float 6s ease-in-out infinite; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center overflow-hidden relative">

    <div class="absolute inset-0 pointer-events-none">
        <img src="ruta/al/icono-chevron.png" class="floating-icon absolute top-[10%] left-[15%] w-24 opacity-20" style="animation-delay: 0s;">
        <img src="ruta/al/icono-chevron.png" class="floating-icon absolute bottom-[20%] right-[10%] w-32 opacity-20" style="animation-delay: 2s;">
        <img src="ruta/al/icono-chevron.png" class="floating-icon absolute top-[60%] left-[5%] w-16 opacity-10" style="animation-delay: 4s;">
    </div>

    <main class="relative z-10 w-full max-w-2xl px-6">
        <div class="glass-card rounded-[3rem] p-10 md:p-16 shadow-[0_32px_64px_rgba(0,0,0,0.3)] text-center">
            
            <div class="flex justify-center mb-8">
                <img src="./assets/acaip.png" alt="ACAIP UGT" class="h-32 w-auto drop-shadow-sm">
            </div>

            <span class="inline-flex items-center px-4 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold uppercase tracking-widest mb-6">
                <span class="w-2 h-2 bg-blue-600 rounded-full mr-2 animate-pulse"></span>
                Estamos trabajando en ello
            </span>

            <h1 class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight">
                Algo grande está por <span class="text-blue-600">llegar.</span>
            </h1>
            
            <p class="text-slate-600 text-lg mb-10 leading-relaxed">
                Estamos renovando nuestra plataforma digital para ofrecerte una mejor defensa y servicios más eficientes. Volveremos muy pronto.
            </p>

            <div class="w-full bg-slate-200 h-3 rounded-full mb-10 overflow-hidden">
                <div class="bg-linear-to-r from-blue-600 to-cyan-400 h-full w-[75%] rounded-full relative">
                    <div class="absolute right-0 top-0 h-full w-8 bg-white/30 skew-x-12 animate-[shimmer_2s_infinite]"></div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-between pt-8 border-t border-slate-200/60 gap-4">
                <div class="text-left">
                    <p class="text-slate-400 text-xs uppercase font-bold tracking-widest text-center">Contacto Urgente</p>
                    <p class="text-slate-700 font-bold text-center">info@acaip.es</p>
                </div>
                <div class="flex space-x-4">
                    <a href="#" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-900 text-white hover:bg-blue-600 transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg>
                    </a>
                    <a href="https://acaip.es" class="px-5 py-2 rounded-xl border border-slate-300 text-slate-700 text-sm font-bold hover:bg-white transition">
                        Web Antigua
                    </a>
                </div>
            </div>

        </div>
        
        <p class="text-white/40 text-center mt-8 text-sm italic">
            &copy; 2026 ACAIP - Sindicato Profesional de Prisiones
        </p>
    </main>

    <style>
        @keyframes shimmer {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }
    </style>
</body>
</html>
