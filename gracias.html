<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Envío Exitoso! - Gracias</title>
    <!--<script src="https://cdn.tailwindcss.com"></script>-->
    <link href="./src/output.css" rel="stylesheet">
    <style>
        @keyframes subtle-zoom {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-zoom { animation: subtle-zoom 0.5s ease-out forwards; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-linear-to-br from-slate-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <main class="max-w-lg w-full bg-white/80 backdrop-blur-sm p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white animate-zoom text-center">
        
        <div class="inline-flex items-center justify-center w-24 h-24 bg-linear-to-tr from-green-400 to-emerald-600 rounded-full mb-8 shadow-lg shadow-green-200">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1 class="text-4xl font-black text-slate-800 mb-4 tracking-tight">
            ¡Todo listo!
        </h1>
        
        <p class="text-slate-600 text-lg leading-relaxed mb-10">
            Tu solicitud ha sido enviada con <span class="font-bold text-emerald-600">éxito</span>. Hemos recibido tus datos y tu delegado se pondrá en contacto contigo en breve.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="https://www.acaip.es/areas/informacion-general/item/download/2282_74fb7440347ef023bf69a8e0aa34543b" class="px-8 py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-2xl transition-all duration-300 transform hover:-translate-y-1 shadow-xl active:scale-95">
                <i class="fa-regular fa-file-pdf"></i>
                Descargar Guía de Servicios
            </a>
            <button onclick="window.history.back()" class="px-8 py-4 bg-white hover:bg-slate-50 text-slate-700 font-semibold rounded-2xl border border-slate-200 transition-all duration-300 shadow-sm">
                Atrás
            </button>
        </div>
        <div class="max-w-3xl mx-auto bg-blue-500 rounded-3xl shadow-xl overflow-hidden mt-10">
            <div class="logo-wrap p-5">
                    <img src="./assets/acaip.webp" alt="logo-acaip">
            </div>
        </div>
        
        
    </main>

</body>
</html>
